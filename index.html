<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
        }
        nav a:hover {
            color: #ddd;
        }
        ul {
            list-style: none;
            display: flex;
            padding: 0;
            margin: 0;
        }
        li {
            margin-left: 1rem;
        }
        .menu, .auth {
            display: flex;
            align-items: center;
        }
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
            ul {
                flex-direction: column;
                width: 100%;
            }
            li {
                margin: 0.5rem 0;
            }
            .auth {
                margin-top: 1rem;
                flex-direction: column;
                align-items: flex-start;
            }
            .auth a {
                margin: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">ShopMate</a>
        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="auth">
            <a href="#">Login</a>
            <a href="#">Cart</a>
        </div>
    </nav>
</body>
</html>
